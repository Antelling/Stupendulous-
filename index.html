    <script>
        class ChaosRenderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.gl = canvas.getContext('webgl2', { antialias: false, preserveDrawingBuffer: true });
                if (!this.gl) { alert('WebGL 2.0 not supported!'); return; }
                this.gl.getExtension('EXT_color_buffer_float');
                
                this.system = 'rigid';  // 'rigid', 'elastic1', 'elastic2', 'elastic12'
                this.vizMode = 'distance';  // 'distance' or 'divergence'
                this.resolution = 512;
                this.theta1Range = [-3.14, 3.14];
                this.theta2Range = [-3.14, 3.14];
                this.omega1 = 0;
                this.omega2 = 0;
                
                this.dt = 0.002;
                this.iterationsPerFrame = 10;
                this.maxIter = 5000;
                this.threshold = 0.05;
                this.perturb = 0.00001;
                this.k1 = 50;
                this.k2 = 50;
                this.colormap = 6;
                this.toneMapping = 0;
                
                this.frameCount = 0;
                this.maxValue = 0;
                this.readIndex = 0;
                this.zoomHistory = [];
                this.isDragging = false;
                this.dragStart = null;
                this.dragCurrent = null;
                
                this.lastTime = performance.now();
                this.fps = 0;
                this.seed = Math.random() * 1000;
                this.divergenceInterval = null;
                this.divergenceRenderInterval = null;
                
                this.init();
            }
            
            init() {
                this.createPrograms();
                this.createBuffers();
                this.createTextures();
                this.setupControls();
                this.setupZoomControls();
                this.reset();
                this.animate();
            }
            
            compileShader(type, source) {
                const gl = this.gl;
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source.trim());
                gl.compileShader(shader);
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error('Shader error:', gl.getShaderInfoLog(shader));
                    return null;
                }
                return shader;
            }
            
            createProgram(vsId, fsId) {
                const gl = this.gl;
                const vs = this.compileShader(gl.VERTEX_SHADER, document.getElementById(vsId).textContent);
                const fs = this.compileShader(gl.FRAGMENT_SHADER, document.getElementById(fsId).textContent);
                const program = gl.createProgram();
                gl.attachShader(program, vs);
                gl.attachShader(program, fs);
                gl.linkProgram(program);
                if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                    console.error('Program link error:', gl.getProgramInfoLog(program));
                    return null;
                }
                return program;
            }
            
            createPrograms() {
                this.programs = {
                    init: this.createProgram('vertex-shader', 'init-shader'),
                    physics: this.createProgram('vertex-shader', 'physics-shader'),
                    distance: this.createProgram('vertex-shader', 'distance-shader'),
                    initDivergence: this.createProgram('vertex-shader', 'init-divergence-shader'),
                    divergence: this.createProgram('vertex-shader', 'divergence-shader'),
                    render: this.createProgram('vertex-shader', 'render-shader'),
                    initElastic: this.createProgram('vertex-shader', 'init-elastic-shader'),
                    physicsElastic: this.createProgram('vertex-shader', 'physics-elastic-shader'),
                    distanceElastic: this.createProgram('vertex-shader', 'distance-elastic-shader'),
                    initElasticDivergence: this.createProgram('vertex-shader', 'init-elastic-divergence-shader'),
                    divergenceElastic: this.createProgram('vertex-shader', 'divergence-elastic-shader')
                };
            }
            
            createBuffers() {
                const gl = this.gl;
                const positions = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
                this.quadBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, this.quadBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
                
                this.vaos = {};
                for (const [name, program] of Object.entries(this.programs)) {
                    const vao = gl.createVertexArray();
                    gl.bindVertexArray(vao);
                    gl.bindBuffer(gl.ARRAY_BUFFER, this.quadBuffer);
                    const posLoc = gl.getAttribLocation(program, 'a_position');
                    gl.enableVertexAttribArray(posLoc);
                    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
                    this.vaos[name] = vao;
                }
                gl.bindVertexArray(null);
            }
            
            createTextures() {
                const gl = this.gl;
                const res = this.resolution;

                this.stateTextures = [this.createFloatTexture(res), this.createFloatTexture(res)];
                this.perturbedStateTextures = [this.createFloatTexture(res), this.createFloatTexture(res)];
                this.stateATextures = [this.createFloatTexture(res), this.createFloatTexture(res)];
                this.stateBTextures = [this.createFloatTexture(res), this.createFloatTexture(res)];
                this.perturbedStateATextures = [this.createFloatTexture(res), this.createFloatTexture(res)];
                this.perturbedStateBTextures = [this.createFloatTexture(res), this.createFloatTexture(res)];
                this.dataTextures = [this.createFloatTexture(res), this.createFloatTexture(res)];
                this.framebuffers = [gl.createFramebuffer(), gl.createFramebuffer()];
                this.readIndex = 0;
            }
            
            createFloatTexture(size) {
                const gl = this.gl;
                const tex = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, tex);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, size, size, 0, gl.RGBA, gl.FLOAT, null);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                return tex;
            }
            
            setupControls() {
                document.getElementById('systemType').addEventListener('change', (e) => {
                    this.system = e.target.value;
                    this.updateModeUI();
                    this.reset();
                });

                document.getElementById('vizMode').addEventListener('change', (e) => {
                    this.vizMode = e.target.value;
                    this.updateModeUI();
                    this.reset();
                });
                
                document.getElementById('resolution').addEventListener('change', (e) => {
                    this.resolution = parseInt(e.target.value);
                    this.canvas.width = this.resolution;
                    this.canvas.height = this.resolution;
                    this.createTextures();
                    this.reset();
                });
                
                ['theta1Min', 'theta1Max', 'theta2Min', 'theta2Max'].forEach(id => {
                    document.getElementById(id).addEventListener('change', (e) => {
                        const val = parseFloat(e.target.value);
                        if (id === 'theta1Min') this.theta1Range[0] = val;
                        else if (id === 'theta1Max') this.theta1Range[1] = val;
                        else if (id === 'theta2Min') this.theta2Range[0] = val;
                        else if (id === 'theta2Max') this.theta2Range[1] = val;
                        this.zoomHistory = [];
                        this.updateZoomLevel();
                        this.reset();
                    });
                });
                
                document.getElementById('omega1').addEventListener('input', (e) => {
                    this.omega1 = parseFloat(e.target.value);
                    document.getElementById('omega1Value').textContent = this.omega1.toFixed(1);
                    this.reset();
                });
                
                document.getElementById('omega2').addEventListener('input', (e) => {
                    this.omega2 = parseFloat(e.target.value);
                    document.getElementById('omega2Value').textContent = this.omega2.toFixed(1);
                    this.reset();
                });
                
                document.getElementById('dt').addEventListener('input', (e) => {
                    this.dt = parseFloat(e.target.value);
                    document.getElementById('dtValue').textContent = this.dt.toFixed(3);
                });
                
                document.getElementById('iterations').addEventListener('input', (e) => {
                    this.iterationsPerFrame = parseInt(e.target.value);
                    document.getElementById('iterValue').textContent = this.iterationsPerFrame;
                });
                
                document.getElementById('maxIter').addEventListener('change', (e) => {
                    this.maxIter = parseInt(e.target.value);
                    this.reset();
                });
                
                document.getElementById('dtDiv').addEventListener('input', (e) => {
                    this.dt = parseFloat(e.target.value);
                    document.getElementById('dtDivValue').textContent = this.dt.toFixed(3);
                    this.reset();
                });
                
                document.getElementById('threshold').addEventListener('input', (e) => {
                    this.threshold = parseFloat(e.target.value);
                    document.getElementById('thresholdValue').textContent = this.threshold.toFixed(2);
                    this.reset();
                });
                
                document.getElementById('perturb').addEventListener('input', (e) => {
                    this.perturb = parseFloat(e.target.value);
                    document.getElementById('perturbValue').textContent = this.perturb.toFixed(6);
                    this.reset();
                });
                
                document.getElementById('colormap').addEventListener('change', (e) => {
                    this.colormap = parseInt(e.target.value);
                    this.updateLegend();
                });
                
                document.getElementById('toneMapping').addEventListener('change', (e) => {
                    this.toneMapping = parseInt(e.target.value);
                });
                
                document.getElementById('resetBtn').addEventListener('click', () => {
                    this.theta1Range = [-3.14, 3.14];
                    this.theta2Range = [-3.14, 3.14];
                    this.zoomHistory = [];
                    this.updateRangeInputs();
                    this.updateZoomLevel();
                    this.reset();
                });
                
                document.getElementById('downloadBtn').addEventListener('click', () => this.download());

                document.getElementById('k1').addEventListener('input', (e) => {
                    this.k1 = parseFloat(e.target.value);
                    document.getElementById('k1Value').textContent = this.k1;
                    this.reset();
                });

                document.getElementById('k2').addEventListener('input', (e) => {
                    this.k2 = parseFloat(e.target.value);
                    document.getElementById('k2Value').textContent = this.k2;
                    this.reset();
                });
                
                this.updateModeUI();
                this.updateLegend();
            }
            
            download() {
                const link = document.createElement('a');
                link.download = `chaos-${this.system}-${this.vizMode}-frame${this.frameCount}.png`;
                link.href = this.canvas.toDataURL('image/png');
                link.click();
            }

            updateModeUI() {
                const isDistance = this.vizMode === 'distance';
                const isElastic = this.system !== 'rigid';
                const isDivergence = this.vizMode === 'divergence';

                // Show/hide control sections
                document.getElementById('distanceControls').style.display = isDistance ? 'block' : 'none';
                document.getElementById('elasticControls').style.display = isElastic ? 'block' : 'none';
                document.getElementById('divergenceControls').style.display = isDivergence ? 'block' : 'none';

                // Update mode indicator
                const systemNames = { rigid: 'Rigid', elastic1: 'Elastic Arm 1', elastic2: 'Elastic Arm 2', elastic12: 'Both Elastic' };
                const modeNames = { distance: 'Bob2 Distance', divergence: 'Divergence Time' };
                document.getElementById('modeIndicator').textContent = systemNames[this.system] + ' \u00b7 ' + modeNames[this.vizMode];

                // Update subtitle
                const subtitles = {
                    distance: isElastic ? 'Total distance traveled by bob2 (elastic system)' : 'Total distance traveled by the second pendulum bob',
                    divergence: 'Iterations until perturbed trajectory diverges'
                };
                document.getElementById('subtitle').textContent = subtitles[this.vizMode];

                // Stats visibility
                document.getElementById('frameRow').style.display = isDivergence ? 'none' : 'block';
                document.getElementById('maxDistRow').style.display = isDivergence ? 'none' : 'block';
            }

            updateLegend() {
                const gradient = document.getElementById('legendGradient');
                const isRainbow = this.colormap === 6;
                gradient.className = 'legend-gradient ' + (isRainbow ? 'rainbow-gradient' : 'viridis-gradient');
            }

            setupZoomControls() {
                const overlay = document.getElementById('zoomOverlay');
                this.canvas.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    const rect = this.canvas.getBoundingClientRect();
                    const x = (e.clientX - rect.left) * (this.canvas.width / rect.width);
                    const y = (e.clientY - rect.top) * (this.canvas.height / rect.height);
                    this.isDragging = true;
                    this.dragStart = { x, y };
                    this.dragCurrent = { x, y };
                });
                this.canvas.addEventListener('mousemove', (e) => {
                    if (!this.isDragging) return;
                    const rect = this.canvas.getBoundingClientRect();
                    this.dragCurrent = {
                        x: (e.clientX - rect.left) * (this.canvas.width / rect.width),
                        y: (e.clientY - rect.top) * (this.canvas.height / rect.height)
                    };
                    this.updateZoomOverlay();
                });
                this.canvas.addEventListener('mouseup', (e) => {
                    if (!this.isDragging) return;
                    const rect = this.canvas.getBoundingClientRect();
                    this.dragCurrent = {
                        x: (e.clientX - rect.left) * (this.canvas.width / rect.width),
                        y: (e.clientY - rect.top) * (this.canvas.height / rect.height)
                    };
                    const dragDist = Math.sqrt(Math.pow(this.dragCurrent.x - this.dragStart.x, 2) +
                                               Math.pow(this.dragCurrent.y - this.dragStart.y, 2));
                    if (dragDist > 5) this.applyZoomRectangle();
                    this.isDragging = false;
                    this.dragStart = null;
                    this.dragCurrent = null;
                    overlay.style.display = 'none';
                });
                this.canvas.addEventListener('mouseleave', () => {
                    this.isDragging = false;
                    this.dragStart = null;
                    this.dragCurrent = null;
                    overlay.style.display = 'none';
                });
                this.canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); this.zoomOut(); });
                document.getElementById('zoomOutBtn').addEventListener('click', () => this.zoomOut());
            }

            updateZoomOverlay() {
                const overlay = document.getElementById('zoomOverlay');
                const wrapper = document.getElementById('canvasWrapper');
                const canvasRect = this.canvas.getBoundingClientRect();
                const wrapperRect = wrapper.getBoundingClientRect();
                const scaleX = wrapperRect.width / this.canvas.width;
                const scaleY = wrapperRect.height / this.canvas.height;
                const x1 = Math.min(this.dragStart.x, this.dragCurrent.x) * scaleX;
                const y1 = Math.min(this.dragStart.y, this.dragCurrent.y) * scaleY;
                const x2 = Math.max(this.dragStart.x, this.dragCurrent.x) * scaleX;
                const y2 = Math.max(this.dragStart.y, this.dragCurrent.y) * scaleY;
                overlay.style.display = 'block';
                overlay.style.left = x1 + 'px';
                overlay.style.top = y1 + 'px';
                overlay.style.width = (x2 - x1) + 'px';
                overlay.style.height = (y2 - y1) + 'px';
            }

            applyZoomRectangle() {
                const nx1 = Math.max(0, Math.min(1, Math.min(this.dragStart.x, this.dragCurrent.x) / this.canvas.width));
                const nx2 = Math.max(0, Math.min(1, Math.max(this.dragStart.x, this.dragCurrent.x) / this.canvas.width));
                const ny1 = Math.max(0, Math.min(1, 1 - Math.max(this.dragStart.y, this.dragCurrent.y) / this.canvas.height));
                const ny2 = Math.max(0, Math.min(1, 1 - Math.min(this.dragStart.y, this.dragCurrent.y) / this.canvas.height));
                const dataX1 = this.theta1Range[0] + nx1 * (this.theta1Range[1] - this.theta1Range[0]);
                const dataX2 = this.theta1Range[0] + nx2 * (this.theta1Range[1] - this.theta1Range[0]);
                const dataY1 = this.theta2Range[0] + ny1 * (this.theta2Range[1] - this.theta2Range[0]);
                const dataY2 = this.theta2Range[0] + ny2 * (this.theta2Range[1] - this.theta2Range[0]);
                this.zoomHistory.push({ theta1: [...this.theta1Range], theta2: [...this.theta2Range] });
                this.theta1Range = [Math.min(dataX1, dataX2), Math.max(dataX1, dataX2)];
                this.theta2Range = [Math.min(dataY1, dataY2), Math.max(dataY1, dataY2)];
                this.updateRangeInputs();
                this.updateZoomLevel();
                this.reset();
            }

            zoomOut() {
                if (this.zoomHistory.length > 0) {
                    const prev = this.zoomHistory.pop();
                    this.theta1Range = prev.theta1;
                    this.theta2Range = prev.theta2;
                } else {
                    this.theta1Range = [-3.14, 3.14];
                    this.theta2Range = [-3.14, 3.14];
                }
                this.updateRangeInputs();
                this.updateZoomLevel();
                this.reset();
            }

            updateRangeInputs() {
                document.getElementById('theta1Min').value = this.theta1Range[0].toFixed(2);
                document.getElementById('theta1Max').value = this.theta1Range[1].toFixed(2);
                document.getElementById('theta2Min').value = this.theta2Range[0].toFixed(2);
                document.getElementById('theta2Max').value = this.theta2Range[1].toFixed(2);
            }

            updateZoomLevel() {
                document.getElementById('zoomLevel').textContent = this.zoomHistory.length + 1;
            }

            reset() {
                const gl = this.gl;
                this.frameCount = 0;
                this.maxValue = 0;
                this.readIndex = 0;
                this.seed = Math.random() * 1000;
                this.stopDivergence();
                const res = this.resolution;

                if (this.system === 'rigid' && this.vizMode === 'distance') {
                    gl.useProgram(this.programs.init);
                    gl.bindVertexArray(this.vaos.init);
                    gl.uniform2f(gl.getUniformLocation(this.programs.init, 'u_theta1Range'), this.theta1Range[0], this.theta1Range[1]);
                    gl.uniform2f(gl.getUniformLocation(this.programs.init, 'u_theta2Range'), this.theta2Range[0], this.theta2Range[1]);
                    gl.uniform1f(gl.getUniformLocation(this.programs.init, 'u_omega1'), this.omega1);
                    gl.uniform1f(gl.getUniformLocation(this.programs.init, 'u_omega2'), this.omega2);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[0]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.stateTextures[0], 0);
                    gl.viewport(0, 0, res, res);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                    gl.useProgram(this.programs.distance);
                    gl.bindVertexArray(this.vaos.distance);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distance, 'u_stateTexture'), 0);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distance, 'u_distanceTexture'), 1);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distance, 'u_reset'), 1);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, this.stateTextures[0]);
                    gl.activeTexture(gl.TEXTURE1);
                    gl.bindTexture(gl.TEXTURE_2D, this.dataTextures[0]);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[1]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.dataTextures[1], 0);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    [this.dataTextures[0], this.dataTextures[1]] = [this.dataTextures[1], this.dataTextures[0]];
                } else if (this.system === 'rigid' && this.vizMode === 'divergence') {
                    gl.useProgram(this.programs.initDivergence);
                    gl.bindVertexArray(this.vaos.initDivergence);
                    gl.uniform2f(gl.getUniformLocation(this.programs.initDivergence, 'u_theta1Range'), this.theta1Range[0], this.theta1Range[1]);
                    gl.uniform2f(gl.getUniformLocation(this.programs.initDivergence, 'u_theta2Range'), this.theta2Range[0], this.theta2Range[1]);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initDivergence, 'u_omega1'), this.omega1);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initDivergence, 'u_omega2'), this.omega2);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initDivergence, 'u_perturb'), this.perturb);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initDivergence, 'u_seed'), this.seed);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[0]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.stateTextures[0], 0);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT1, gl.TEXTURE_2D, this.perturbedStateTextures[0], 0);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT2, gl.TEXTURE_2D, this.dataTextures[0], 0);
                    gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1, gl.COLOR_ATTACHMENT2]);
                    gl.viewport(0, 0, res, res);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    this.readIndex = 0;
                    this.startDivergence();
                } else if (this.system !== 'rigid' && this.vizMode === 'divergence') {
                    const mode = this.system === 'elastic1' ? 0 : this.system === 'elastic2' ? 1 : 2;
                    gl.useProgram(this.programs.initElasticDivergence);
                    gl.bindVertexArray(this.vaos.initElasticDivergence);
                    gl.uniform2f(gl.getUniformLocation(this.programs.initElasticDivergence, 'u_theta1Range'), this.theta1Range[0], this.theta1Range[1]);
                    gl.uniform2f(gl.getUniformLocation(this.programs.initElasticDivergence, 'u_theta2Range'), this.theta2Range[0], this.theta2Range[1]);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initElasticDivergence, 'u_omega1'), this.omega1);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initElasticDivergence, 'u_omega2'), this.omega2);
                    gl.uniform1i(gl.getUniformLocation(this.programs.initElasticDivergence, 'u_elasticMode'), mode);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initElasticDivergence, 'u_perturb'), this.perturb);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initElasticDivergence, 'u_seed'), this.seed);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[0]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.stateATextures[0], 0);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT1, gl.TEXTURE_2D, this.stateBTextures[0], 0);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT2, gl.TEXTURE_2D, this.perturbedStateATextures[0], 0);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT3, gl.TEXTURE_2D, this.perturbedStateBTextures[0], 0);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT4, gl.TEXTURE_2D, this.dataTextures[0], 0);
                    gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1, gl.COLOR_ATTACHMENT2, gl.COLOR_ATTACHMENT3, gl.COLOR_ATTACHMENT4]);
                    gl.viewport(0, 0, res, res);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    this.readIndex = 0;
                    this.startDivergence();
                } else if (this.system !== 'rigid' && this.vizMode === 'distance') {
                    const mode = this.system === 'elastic1' ? 0 : this.system === 'elastic2' ? 1 : 2;

                    gl.useProgram(this.programs.initElastic);
                    gl.bindVertexArray(this.vaos.initElastic);
                    gl.uniform2f(gl.getUniformLocation(this.programs.initElastic, 'u_theta1Range'), this.theta1Range[0], this.theta1Range[1]);
                    gl.uniform2f(gl.getUniformLocation(this.programs.initElastic, 'u_theta2Range'), this.theta2Range[0], this.theta2Range[1]);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initElastic, 'u_omega1'), this.omega1);
                    gl.uniform1f(gl.getUniformLocation(this.programs.initElastic, 'u_omega2'), this.omega2);
                    gl.uniform1i(gl.getUniformLocation(this.programs.initElastic, 'u_elasticMode'), mode);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[0]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.stateATextures[0], 0);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT1, gl.TEXTURE_2D, this.stateBTextures[0], 0);
                    gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1]);
                    gl.viewport(0, 0, res, res);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                    gl.useProgram(this.programs.distanceElastic);
                    gl.bindVertexArray(this.vaos.distanceElastic);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_stateTextureA'), 0);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_stateTextureB'), 1);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_distanceTexture'), 2);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_reset'), 1);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_elasticMode'), mode);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, this.stateATextures[0]);
                    gl.activeTexture(gl.TEXTURE1);
                    gl.bindTexture(gl.TEXTURE_2D, this.stateBTextures[0]);
                    gl.activeTexture(gl.TEXTURE2);
                    gl.bindTexture(gl.TEXTURE_2D, this.dataTextures[0]);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[1]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.dataTextures[1], 0);
                    gl.drawBuffers([gl.COLOR_ATTACHMENT0]);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    [this.dataTextures[0], this.dataTextures[1]] = [this.dataTextures[1], this.dataTextures[0]];
                }
                gl.bindFramebuffer(gl.FRAMEBUFFER, null);
                gl.bindVertexArray(null);
            }

            startDivergence() {
                this.stopDivergence();
                if (this.system !== 'rigid') {
                    this.startElasticDivergence();
                    return;
                }
                this.divergenceInterval = setInterval(() => {
                    if (this.frameCount >= this.maxIter) {
                        this.stopDivergence();
                        this.computeMaxValue();
                        return;
                    }
                    const gl = this.gl;
                    const res = this.resolution;
                    const batchSize = 20;
                    for (let i = 0; i < batchSize; i++) {
                        if (this.frameCount >= this.maxIter) break;
                        this.frameCount++;
                        const readIdx = this.readIndex;
                        const writeIdx = 1 - this.readIndex;
                        gl.useProgram(this.programs.divergence);
                        gl.bindVertexArray(this.vaos.divergence);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergence, 'u_stateTexture'), 0);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergence, 'u_perturbedTexture'), 1);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergence, 'u_divergenceTexture'), 2);
                        gl.uniform1f(gl.getUniformLocation(this.programs.divergence, 'u_dt'), this.dt);
                        gl.uniform1f(gl.getUniformLocation(this.programs.divergence, 'u_threshold'), this.threshold);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergence, 'u_currentIter'), this.frameCount);
                        gl.activeTexture(gl.TEXTURE0);
                        gl.bindTexture(gl.TEXTURE_2D, this.stateTextures[readIdx]);
                        gl.activeTexture(gl.TEXTURE1);
                        gl.bindTexture(gl.TEXTURE_2D, this.perturbedStateTextures[readIdx]);
                        gl.activeTexture(gl.TEXTURE2);
                        gl.bindTexture(gl.TEXTURE_2D, this.dataTextures[readIdx]);
                        gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[0]);
                        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.stateTextures[writeIdx], 0);
                        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT1, gl.TEXTURE_2D, this.perturbedStateTextures[writeIdx], 0);
                        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT2, gl.TEXTURE_2D, this.dataTextures[writeIdx], 0);
                        gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1, gl.COLOR_ATTACHMENT2]);
                        gl.viewport(0, 0, res, res);
                        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                        this.readIndex = writeIdx;
                    }
                }, 20);
                this.divergenceRenderInterval = setInterval(() => this.computeMaxValue(), 500);
            }

            stopDivergence() {
                if (this.divergenceInterval) {
                    clearInterval(this.divergenceInterval);
                    this.divergenceInterval = null;
                }
                if (this.divergenceRenderInterval) {
                    clearInterval(this.divergenceRenderInterval);
                    this.divergenceRenderInterval = null;
                }
            }

            startElasticDivergence() {
                this.stopDivergence();
                const mode = this.system === 'elastic1' ? 0 : this.system === 'elastic2' ? 1 : 2;
                this.divergenceInterval = setInterval(() => {
                    if (this.frameCount >= this.maxIter) {
                        this.stopDivergence();
                        this.computeMaxValue();
                        return;
                    }
                    const gl = this.gl;
                    const res = this.resolution;
                    const batchSize = 20;
                    for (let i = 0; i < batchSize; i++) {
                        if (this.frameCount >= this.maxIter) break;
                        this.frameCount++;
                        const readIdx = this.readIndex;
                        const writeIdx = 1 - this.readIndex;
                        gl.useProgram(this.programs.divergenceElastic);
                        gl.bindVertexArray(this.vaos.divergenceElastic);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergenceElastic, 'u_baseTextureA'), 0);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergenceElastic, 'u_baseTextureB'), 1);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergenceElastic, 'u_pertTextureA'), 2);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergenceElastic, 'u_pertTextureB'), 3);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergenceElastic, 'u_divergenceTexture'), 4);
                        gl.uniform1f(gl.getUniformLocation(this.programs.divergenceElastic, 'u_dt'), this.dt);
                        gl.uniform1f(gl.getUniformLocation(this.programs.divergenceElastic, 'u_threshold'), this.threshold);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergenceElastic, 'u_currentIter'), this.frameCount);
                        gl.uniform1i(gl.getUniformLocation(this.programs.divergenceElastic, 'u_elasticMode'), mode);
                        gl.uniform1f(gl.getUniformLocation(this.programs.divergenceElastic, 'u_k1'), this.k1);
                        gl.uniform1f(gl.getUniformLocation(this.programs.divergenceElastic, 'u_k2'), this.k2);
                        gl.activeTexture(gl.TEXTURE0);
                        gl.bindTexture(gl.TEXTURE_2D, this.stateATextures[readIdx]);
                        gl.activeTexture(gl.TEXTURE1);
                        gl.bindTexture(gl.TEXTURE_2D, this.stateBTextures[readIdx]);
                        gl.activeTexture(gl.TEXTURE2);
                        gl.bindTexture(gl.TEXTURE_2D, this.perturbedStateATextures[readIdx]);
                        gl.activeTexture(gl.TEXTURE3);
                        gl.bindTexture(gl.TEXTURE_2D, this.perturbedStateBTextures[readIdx]);
                        gl.activeTexture(gl.TEXTURE4);
                        gl.bindTexture(gl.TEXTURE_2D, this.dataTextures[readIdx]);
                        gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[0]);
                        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.stateATextures[writeIdx], 0);
                        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT1, gl.TEXTURE_2D, this.stateBTextures[writeIdx], 0);
                        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT2, gl.TEXTURE_2D, this.perturbedStateATextures[writeIdx], 0);
                        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT3, gl.TEXTURE_2D, this.perturbedStateBTextures[writeIdx], 0);
                        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT4, gl.TEXTURE_2D, this.dataTextures[writeIdx], 0);
                        gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1, gl.COLOR_ATTACHMENT2, gl.COLOR_ATTACHMENT3, gl.COLOR_ATTACHMENT4]);
                        gl.viewport(0, 0, res, res);
                        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                        this.readIndex = writeIdx;
                    }
                }, 20);
                this.divergenceRenderInterval = setInterval(() => this.computeMaxValue(), 500);
            }

            step() {
                if (this.vizMode === 'divergence') return;
                if (this.system !== 'rigid') {
                    this.stepElastic();
                    return;
                }
                const gl = this.gl;
                const res = this.resolution;
                for (let i = 0; i < this.iterationsPerFrame; i++) {
                    const readIdx = this.readIndex;
                    const writeIdx = 1 - this.readIndex;
                    gl.useProgram(this.programs.physics);
                    gl.bindVertexArray(this.vaos.physics);
                    gl.uniform1i(gl.getUniformLocation(this.programs.physics, 'u_stateTexture'), 0);
                    gl.uniform1f(gl.getUniformLocation(this.programs.physics, 'u_dt'), this.dt);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, this.stateTextures[readIdx]);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[0]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.stateTextures[writeIdx], 0);
                    gl.viewport(0, 0, res, res);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                    gl.useProgram(this.programs.distance);
                    gl.bindVertexArray(this.vaos.distance);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distance, 'u_stateTexture'), 0);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distance, 'u_distanceTexture'), 1);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distance, 'u_reset'), 0);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, this.stateTextures[writeIdx]);
                    gl.activeTexture(gl.TEXTURE1);
                    gl.bindTexture(gl.TEXTURE_2D, this.dataTextures[readIdx]);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[1]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.dataTextures[writeIdx], 0);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    this.readIndex = writeIdx;
                }
                this.frameCount += this.iterationsPerFrame;
            }

            stepElastic() {
                const gl = this.gl;
                const res = this.resolution;
                const mode = this.system === 'elastic1' ? 0 : this.system === 'elastic2' ? 1 : 2;

                for (let i = 0; i < this.iterationsPerFrame; i++) {
                    const readIdx = this.readIndex;
                    const writeIdx = 1 - this.readIndex;

                    // Physics step (MRT with 2 outputs)
                    gl.useProgram(this.programs.physicsElastic);
                    gl.bindVertexArray(this.vaos.physicsElastic);
                    gl.uniform1i(gl.getUniformLocation(this.programs.physicsElastic, 'u_stateTextureA'), 0);
                    gl.uniform1i(gl.getUniformLocation(this.programs.physicsElastic, 'u_stateTextureB'), 1);
                    gl.uniform1f(gl.getUniformLocation(this.programs.physicsElastic, 'u_dt'), this.dt);
                    gl.uniform1i(gl.getUniformLocation(this.programs.physicsElastic, 'u_elasticMode'), mode);
                    gl.uniform1f(gl.getUniformLocation(this.programs.physicsElastic, 'u_k1'), this.k1);
                    gl.uniform1f(gl.getUniformLocation(this.programs.physicsElastic, 'u_k2'), this.k2);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, this.stateATextures[readIdx]);
                    gl.activeTexture(gl.TEXTURE1);
                    gl.bindTexture(gl.TEXTURE_2D, this.stateBTextures[readIdx]);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[0]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.stateATextures[writeIdx], 0);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT1, gl.TEXTURE_2D, this.stateBTextures[writeIdx], 0);
                    gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1]);
                    gl.viewport(0, 0, res, res);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                    // Distance step
                    gl.useProgram(this.programs.distanceElastic);
                    gl.bindVertexArray(this.vaos.distanceElastic);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_stateTextureA'), 0);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_stateTextureB'), 1);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_distanceTexture'), 2);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_reset'), 0);
                    gl.uniform1i(gl.getUniformLocation(this.programs.distanceElastic, 'u_elasticMode'), mode);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, this.stateATextures[writeIdx]);
                    gl.activeTexture(gl.TEXTURE1);
                    gl.bindTexture(gl.TEXTURE_2D, this.stateBTextures[writeIdx]);
                    gl.activeTexture(gl.TEXTURE2);
                    gl.bindTexture(gl.TEXTURE_2D, this.dataTextures[readIdx]);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[1]);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.dataTextures[writeIdx], 0);
                    gl.drawBuffers([gl.COLOR_ATTACHMENT0]);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                    this.readIndex = writeIdx;
                }
                this.frameCount += this.iterationsPerFrame;
            }

            render() {
                const gl = this.gl;
                if (this.vizMode !== 'divergence') {
                    this.computeMaxValue();
                }
                gl.bindFramebuffer(gl.FRAMEBUFFER, null);
                gl.viewport(0, 0, this.canvas.width, this.canvas.height);
                gl.useProgram(this.programs.render);
                gl.bindVertexArray(this.vaos.render);
                gl.uniform1i(gl.getUniformLocation(this.programs.render, 'u_dataTexture'), 0);
                gl.uniform1i(gl.getUniformLocation(this.programs.render, 'u_colormap'), this.colormap);
                gl.uniform1i(gl.getUniformLocation(this.programs.render, 'u_toneMapping'), this.toneMapping);
                gl.uniform1f(gl.getUniformLocation(this.programs.render, 'u_maxValue'), this.maxValue || 1);
                gl.uniform1i(gl.getUniformLocation(this.programs.render, 'u_isDivergenceMode'), this.vizMode === 'divergence' ? 1 : 0);
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, this.dataTextures[this.readIndex]);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                gl.bindVertexArray(null);
            }

            computeMaxValue() {
                const gl = this.gl;
                const res = this.resolution;
                const isDivergence = this.vizMode === 'divergence';
                const tempFb = gl.createFramebuffer();
                gl.bindFramebuffer(gl.FRAMEBUFFER, tempFb);
                gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.dataTextures[this.readIndex], 0);
                const sampleSize = isDivergence ? res : Math.min(128, res);
                const pixels = new Float32Array(sampleSize * sampleSize * 4);
                gl.viewport(0, 0, sampleSize, sampleSize);
                gl.readPixels(0, 0, sampleSize, sampleSize, gl.RGBA, gl.FLOAT, pixels);
                let maxVal = 0;
                const channel = isDivergence ? 0 : 2;
                for (let i = 0; i < pixels.length; i += 4) {
                    const val = pixels[i + channel];
                    if (val > maxVal && isFinite(val)) maxVal = val;
                }
                this.maxValue = maxVal;
                gl.deleteFramebuffer(tempFb);
            }

            updateStats() {
                const now = performance.now();
                if (this.vizMode === 'divergence' && this.frameCount >= this.maxIter) {
                    this.fps = 0;
                } else {
                    this.fps = Math.round(1000 / (now - this.lastTime));
                }
                this.lastTime = now;
                document.getElementById('frameCount').textContent = this.frameCount;
                document.getElementById('maxDistance').textContent = this.maxValue.toFixed(2);
                document.getElementById('fps').textContent = this.fps;
            }

            animate() {
                this.step();
                if (this.vizMode !== 'divergence' || this.frameCount < this.maxIter) {
                    this.render();
                }
                this.updateStats();
                requestAnimationFrame(() => this.animate());
            }
        }

        const renderer = new ChaosRenderer(document.getElementById('canvas'));

        // ── Pendulum Preview Overlay ──────────────────────────────────
        class PendulumPreview {
            constructor(frameEl, renderer) {
                this.frameEl = frameEl;
                this.renderer = renderer;
                this.canvas = document.getElementById('previewCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.visible = false;
                this.simulating = false;
                this.animId = null;
                this.debounceTimer = null;
                this.trail = [];
                this.maxTrail = 500;
                this.diverged = false;

                // Physics constants (same as shader)
                this.m1 = 1; this.m2 = 1; this.L1 = 1; this.L2 = 1; this.g = 9.81;

                // State: base pendulum
                this.base = { t1: 0, o1: 0, t2: 0, o2: 0 };
                // State: perturbed pendulum
                this.pert = { t1: 0, o1: 0, t2: 0, o2: 0 };

                // Preview box sizing
                this.boxSize = 170;
                this.boxPad = 12;
                this.armScale = 55; // pixels per unit length (L1+L2=2 → 110px radius)

                this._syncSize();
                this._attach();
            }

            _syncSize() {
                const main = this.renderer.canvas;
                this.canvas.width = main.width;
                this.canvas.height = main.height;
            }

            _attach() {
                const main = this.renderer.canvas;

                main.addEventListener('mousemove', (e) => {
                    if (this.renderer.isDragging) return;
                    const rect = main.getBoundingClientRect();
                    const px = (e.clientX - rect.left) * (main.width / rect.width);
                    const py = (e.clientY - rect.top) * (main.height / rect.height);
                    this._onHover(px, py);
                });

                main.addEventListener('mouseleave', () => this._hide());

                // Resize observer
                new ResizeObserver(() => this._syncSize()).observe(this.frameEl);
            }

            _onHover(px, py) {
                const r = this.renderer;
                const nx = px / r.canvas.width;
                const ny = 1 - py / r.canvas.height;
                const theta1 = r.theta1Range[0] + nx * (r.theta1Range[1] - r.theta1Range[0]);
                const theta2 = r.theta2Range[0] + ny * (r.theta2Range[1] - r.theta2Range[0]);

                // Reset simulation
                this._stopSim();
                this.visible = true;
                this.simulating = false;
                this.diverged = false;
                this.trail = [];

                const p = r.perturb;
                this.base = { t1: theta1, o1: r.omega1, t2: theta2, o2: r.omega2 };
                this.pert = { t1: theta1 + p, o1: r.omega1, t2: theta2 + p, o2: r.omega2 };

                this._drawStatic();

                // Debounce: start sim after 300ms idle
                clearTimeout(this.debounceTimer);
                this.debounceTimer = setTimeout(() => {
                    this.simulating = true;
                    this._simLoop();
                }, 300);
            }

            _hide() {
                this.visible = false;
                this._stopSim();
                clearTimeout(this.debounceTimer);
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            _stopSim() {
                this.simulating = false;
                if (this.animId) {
                    cancelAnimationFrame(this.animId);
                    this.animId = null;
                }
            }

            _computeAccel(t1, o1, t2, o2) {
                const { m1, m2, L1, L2, g } = this;
                const delta = t1 - t2;
                const sd = Math.sin(delta);
                const cd = Math.cos(delta);
                const denom = m1 + m2 * sd * sd;
                const n1 = -m2 * L1 * o1 * o1 * sd * cd
                         - m2 * L2 * o2 * o2 * sd
                         - (m1 + m2) * g * Math.sin(t1)
                         + m2 * g * Math.sin(t2) * cd;
                const n2 = (m1 + m2) * L1 * o1 * o1 * sd
                         + m2 * L2 * o2 * o2 * sd * cd
                         + (m1 + m2) * g * Math.sin(t1) * cd
                         - (m1 + m2) * g * Math.sin(t2);
                return [n1 / (L1 * denom), n2 / (L2 * denom)];
            }

            _verletStep(s) {
                const dt = this.renderer.dt;
                const a = this._computeAccel(s.t1, s.o1, s.t2, s.o2);
                const oh1 = s.o1 + 0.5 * dt * a[0];
                const oh2 = s.o2 + 0.5 * dt * a[1];
                s.t1 += dt * oh1;
                s.t2 += dt * oh2;
                const an = this._computeAccel(s.t1, oh1, s.t2, oh2);
                s.o1 = oh1 + 0.5 * dt * an[0];
                s.o2 = oh2 + 0.5 * dt * an[1];
            }

            _circularDiff(a, b) {
                const PI = Math.PI;
                let d = a - b;
                return d - 2 * PI * Math.floor(d / (2 * PI) + 0.5);
            }

            _measureDiv() {
                const a = this.base, b = this.pert;
                const d1 = this._circularDiff(a.t1, b.t1);
                const d2 = this._circularDiff(a.t2, b.t2);
                return Math.sqrt(d1*d1 + d2*d2 + (a.o1-b.o1)*(a.o1-b.o1) + (a.o2-b.o2)*(a.o2-b.o2));
            }

            _bob2Pos(s) {
                const x1 = this.L1 * Math.sin(s.t1);
                const y1 = -this.L1 * Math.cos(s.t1);
                return { x: x1 + this.L2 * Math.sin(s.t2), y: y1 - this.L2 * Math.cos(s.t2) };
            }

            _simLoop() {
                if (!this.simulating || !this.visible) return;

                // Substeps per frame for smooth motion
                const steps = 15;
                for (let i = 0; i < steps; i++) {
                    this._verletStep(this.base);
                    this._verletStep(this.pert);

                    if (!this.diverged) {
                        const div = this._measureDiv();
                        if (div > this.renderer.threshold) {
                            this.diverged = true;
                        }
                    }

                    if (!this.diverged) {
                        const p = this._bob2Pos(this.base);
                        this.trail.push(p);
                        if (this.trail.length > this.maxTrail) this.trail.shift();
                    }
                }

                this._drawFrame();
                this.animId = requestAnimationFrame(() => this._simLoop());
            }

            _boxOrigin() {
                // Bottom-left corner of the preview box in canvas pixel coords
                const margin = 16;
                const bs = this.boxSize;
                const w = this.canvas.width;
                const h = this.canvas.height;
                return {
                    x: margin,
                    y: h - margin - bs,
                    cx: margin + bs / 2,
                    cy: h - margin - bs / 2
                };
            }

            _drawStatic() {
                this._drawFrame();
            }

            _drawFrame() {
                const ctx = this.ctx;
                const cw = this.canvas.width;
                const ch = this.canvas.height;
                ctx.clearRect(0, 0, cw, ch);
                if (!this.visible) return;

                const { x: bx, y: by, cx, cy } = this._boxOrigin();
                const bs = this.boxSize;
                const sc = this.armScale;

                // Backdrop
                ctx.save();
                ctx.beginPath();
                const r = 10;
                ctx.moveTo(bx + r, by);
                ctx.arcTo(bx + bs, by, bx + bs, by + bs, r);
                ctx.arcTo(bx + bs, by + bs, bx, by + bs, r);
                ctx.arcTo(bx, by + bs, bx, by, r);
                ctx.arcTo(bx, by, bx + bs, by, r);
                ctx.closePath();
                ctx.fillStyle = 'rgba(8, 10, 16, 0.88)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();

                // Clip to box
                ctx.save();
                ctx.beginPath();
                ctx.rect(bx, by, bs, bs);
                ctx.clip();

                // Draw trail
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    for (let i = 0; i < this.trail.length; i++) {
                        const p = this.trail[i];
                        const px = cx + p.x * sc;
                        const py = cy + p.y * sc;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    const trailAlpha = this.diverged ? 0.5 : 0.7;
                    ctx.strokeStyle = this.diverged ? `rgba(0, 212, 170, ${trailAlpha})` : 'rgba(0, 212, 170, 0.7)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // Glow
                    if (!this.diverged) {
                        ctx.shadowColor = 'rgba(0, 212, 170, 0.4)';
                        ctx.shadowBlur = 6;
                        ctx.strokeStyle = 'rgba(0, 212, 170, 0.3)';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                }

                // Draw perturbed pendulum (behind main)
                this._drawPendulum(ctx, this.pert, cx, cy, sc, true);

                // Draw main pendulum
                this._drawPendulum(ctx, this.base, cx, cy, sc, false);

                ctx.restore(); // un-clip

                // Theta label
                const t1 = this.base.t1.toFixed(2);
                const t2 = this.base.t2.toFixed(2);
                ctx.font = '500 10px "IBM Plex Mono", monospace';
                ctx.fillStyle = 'rgba(200, 202, 212, 0.7)';
                ctx.textAlign = 'left';
                ctx.fillText(`θ₁ ${t1}`, bx + 8, by + bs - 20);
                ctx.fillText(`θ₂ ${t2}`, bx + 8, by + bs - 8);

                // Diverged indicator
                if (this.diverged) {
                    ctx.font = '600 9px "IBM Plex Mono", monospace';
                    ctx.fillStyle = 'rgba(232, 160, 48, 0.9)';
                    ctx.textAlign = 'right';
                    ctx.fillText('DIVERGED', bx + bs - 6, by + bs - 8);
                }
            }

            _drawPendulum(ctx, state, cx, cy, sc, isPerturbed) {
                const { L1, L2 } = this;
                const x1 = L1 * Math.sin(state.t1);
                const y1 = -L1 * Math.cos(state.t1);
                const x2 = x1 + L2 * Math.sin(state.t2);
                const y2 = y1 - L2 * Math.cos(state.t2);

                const px1 = cx + x1 * sc;
                const py1 = cy + y1 * sc;
                const px2 = cx + x2 * sc;
                const py2 = cy + y2 * sc;

                if (isPerturbed) {
                    // Arms
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(px1, py1);
                    ctx.lineTo(px2, py2);
                    ctx.strokeStyle = 'rgba(232, 160, 48, 0.35)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // Bobs
                    ctx.beginPath();
                    ctx.arc(px1, py1, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(232, 160, 48, 0.3)';
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(px2, py2, 3, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(232, 160, 48, 0.4)';
                    ctx.fill();
                } else {
                    // Arms
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(px1, py1);
                    ctx.strokeStyle = 'rgba(200, 202, 212, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(px1, py1);
                    ctx.lineTo(px2, py2);
                    ctx.strokeStyle = 'rgba(0, 212, 170, 0.7)';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Bob 1
                    ctx.beginPath();
                    ctx.arc(px1, py1, 3.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(200, 202, 212, 0.5)';
                    ctx.fill();

                    // Bob 2
                    ctx.beginPath();
                    ctx.arc(px2, py2, 4.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#00d4aa';
                    ctx.fill();
                    ctx.shadowColor = 'rgba(0, 212, 170, 0.5)';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Pivot
                    ctx.beginPath();
                    ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(200, 202, 212, 0.4)';
                    ctx.fill();
                }
            }
        }

        new PendulumPreview(document.getElementById('canvasWrapper'), renderer);
    </script>
</body>
</html>
